<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Pindrop ripple mark — concentric rings, top-down water drop view -->
  <!-- Scaled up to 1024x1024 for Icon Composer visibility -->
  <!-- Center dot: impact point -->
  <circle cx="512" cy="512" r="64" fill="white"/>
  <!-- Ring 1: innermost -->
  <circle cx="512" cy="512" r="192" fill="none" stroke="white" stroke-width="48"/>
  <!-- Ring 2: outer -->
  <circle cx="512" cy="512" r="352" fill="none" stroke="white" stroke-width="40"/>
</svg>
