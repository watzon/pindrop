<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Subtle radial gradient background — depth on water surface -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1E1E28"/>
      <stop offset="100%" stop-color="#141417"/>
    </radialGradient>
    <!-- Angular stroke gradient (same as mark, objectBoundingBox adapts per element) -->
    <linearGradient id="rippleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFD15C" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#F2B54A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F2B54A" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded-square background (macOS icon style, rx≈22.5% of 512) -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>

  <!-- Mark: 2 rings, scaled ×7, centered at (256, 256) -->
  <!-- translate(32,32) scale(7): center (32,32) → (32*7+32, 32*7+32) = (256,256) -->
  <g transform="translate(32, 32) scale(7)">
    <circle cx="32" cy="32" r="3"  fill="#F2B54A"/>
    <circle cx="32" cy="32" r="10" fill="none" stroke="url(#rippleGrad)" stroke-width="2.5"/>
    <circle cx="32" cy="32" r="19" fill="none" stroke="url(#rippleGrad)" stroke-width="2"/>
  </g>
</svg>
