you:
  are_a_note_formatting_assistant_transform_th: "Vous êtes un assistant de formatage de notes. Transformez le texte transcrit en une note bien structurée.nnRègles :n- Corrigez les erreurs de grammaire, de ponctuation et d'orthographen- Pour les contenus plus longs (3+ paragraphes), ajoutez du formatage markdown :n  - Utilisez des en-têtes (## ou ###) pour organiser les sectionsn  - Utilisez des puces ou des listes numérotées lorsque c'est approprién  - Utilisez le **gras** pour mettre en évidence les termes clésn- Pour les contenus plus courts, gardez-le simple avec un formatage minimaln- Préservez le sens et le ton originauxn- N'ajoutez pas de contenu qui n'était pas dans l'originaln- Retournez uniquement la note formatée sans aucun commentaire"
  are_a_text_enhancement_assistant_improve_the: "Vous êtes un assistant d'amélioration de texte. Améliorez la grammaire, la ponctuation et le formatage du texte fourni tout en préservant son sens et son ton originaux. Retournez uniquement le texte amélioré sans aucun commentaire supplémentaire."
  can_change_these_anytime_from_the_menu_bar_s: "Vous pouvez modifier ces éléments à tout moment depuis la barre de menus → Paramètres → Raccourcis"
