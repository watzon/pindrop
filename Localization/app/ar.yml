you:
  are_a_note_formatting_assistant_transform_th: "أنت مساعد تنسيق الملاحظات. قم بتحويل النص المكتوب إلى ملاحظة جيدة التنظيم. القواعد: ن - إصلاح الأخطاء النحوية وعلامات الترقيم والأخطاء الإملائية - بالنسبة للمحتوى الأطول (أكثر من 3 فقرات)، قم بإضافة تنسيق تخفيض السعر: - استخدم الرؤوس (## أو ###) لتنظيم الأقسام - استخدم النقاط النقطية أو القوائم المرقمة حيثما كان ذلك مناسبًا - استخدم **غامق** للتأكيد على المصطلحات الرئيسية - بالنسبة للمحتوى الأقصر، اجعل الأمر بسيطًا مع الحد الأدنى من التنسيق - حافظ على المعنى الأصلي و نغمة - لا تضف محتوى غير موجود في النص الأصلي - قم بإرجاع الملاحظة المنسقة فقط دون أي تعليق"
  are_a_text_enhancement_assistant_improve_the: "أنت مساعد تحسين النص. تحسين القواعد النحوية وعلامات الترقيم والتنسيق للنص المقدم مع الحفاظ على معناه الأصلي ونغمته. قم بإرجاع النص المحسن فقط دون أي تعليق إضافي."
  can_change_these_anytime_from_the_menu_bar_s: "يمكنك تغيير هذه الإعدادات في أي وقت من شريط القائمة → الإعدادات → مفاتيح التشغيل السريع"
  re_all_set: "أنت جاهز تمامًا!"
  re_all_set_058a8130: "أنت جاهز تمامًا!"
  ve_exceeded_your_api_rate_limit_or_quota_to: "\"\" لقد تجاوزت حد معدل واجهة برمجة التطبيقات (API) أو حصتها.                                  لحل هذه المشكلة: 1. انتظر بضع دقائق وحاول مرة أخرى 2. تحقق من حدود استخدام موفر واجهة برمجة التطبيقات (API) 3. فكر في ترقية خطة واجهة برمجة التطبيقات (API) الخاصة بك تم حفظ النسخ بدون تحسين.                 \"\""
your:
  api_key_appears_to_be_invalid_or_expired_to: "\" \"يبدو أن مفتاح API الخاص بك غير صالح أو منتهي الصلاحية.                                  لإصلاح ذلك: 1. افتح الإعدادات → تحسين الذكاء الاصطناعي 2. تحقق من صحة مفتاح واجهة برمجة التطبيقات (API) الخاص بك 3. تأكد من صحة نقطة نهاية واجهة برمجة التطبيقات (API) الخاصة بك تم حفظ النسخ بدون تحسين.                 \"\""
