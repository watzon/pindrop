you:
  are_a_note_formatting_assistant_transform_th: "당신은 노트 서식 도우미입니다. 전사된 텍스트를 잘 구조화된 노트로 변환합니다.nn규칙:n- 문법, 구두점 및 철자 오류 수정n- 긴 콘텐츠(3개 이상의 단락)의 경우 마크다운 서식 추가:n - 헤더(## 또는 ###)를 사용하여 섹션 구성n - 적절한 경우 글머리 기호 또는 번호 매기기 목록 사용 - 핵심 용어 강조를 위해 **굵게** 사용n- 짧은 콘텐츠의 경우 최소한의 서식으로 단순하게 유지n- 원래 의미와 어조 유지- 다음과 같은 내용을 추가하지 마세요. 원본에는 없었습니다. - 설명 없이 형식화된 메모만 반환합니다."
  are_a_text_enhancement_assistant_improve_the: "당신은 텍스트 향상 도우미입니다. 제공된 텍스트의 원래 의미와 어조를 유지하면서 문법, 구두점, 서식을 개선합니다. 추가 설명 없이 향상된 텍스트만 반환합니다."
  can_change_these_anytime_from_the_menu_bar_s: "메뉴 모음 → 설정 → 단축키에서 언제든지 변경할 수 있습니다."
  re_all_set: "모든 준비가 완료되었습니다!"
  re_all_set_058a8130: "모든 준비가 완료되었습니다."
  ve_exceeded_your_api_rate_limit_or_quota_to: "\"\" API 속도 제한 또는 할당량을 초과했습니다.                                  이 문제를 해결하려면: 1. 몇 분 정도 기다렸다가 다시 시도하십시오. 2. API 공급자의 사용 제한을 확인하십시오. 3. API 계획 업그레이드를 고려하십시오. 스크립트가 향상되지 않고 저장되었습니다.                 \"\""
your:
