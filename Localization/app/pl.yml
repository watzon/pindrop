you:
  are_a_note_formatting_assistant_transform_th: |-
    Jesteś asystentem formatowania notatek. Przekształć transkrybowany tekst w notatkę o dobrze zorganizowanej strukturze.
    
    Zasady:
    - Popraw błędy gramatyczne, interpunkcyjne i ortograficzne
    - W przypadku dłuższych treści (ponad 3 akapity) dodaj formatowanie ze znacznikami:
      - Używaj nagłówków (## lub ###), aby organizować sekcje
      - Tam, gdzie to konieczne, używaj wypunktowań lub list numerowanych
      - Używaj **pogrubienia** dla podkreślenia kluczowych terminów
    - W przypadku krótszych treści zachowaj prostotę przy minimalnym formatowaniu
    - Zachowaj oryginalne znaczenie i ton
    - Nie dodawaj treści, których nie było w oryginale
    - Zwróć tylko sformatowaną notatkę bez żadnego komentarza
  are_a_text_enhancement_assistant_improve_the: "Jesteś asystentem ulepszania tekstu. Popraw gramatykę, interpunkcję i formatowanie dostarczonego tekstu, zachowując jego oryginalne znaczenie i ton. Zwróć tylko poprawiony tekst bez dodatkowego komentarza."
  can_change_these_anytime_from_the_menu_bar_s: "Możesz je zmienić w dowolnym momencie z paska menu → Ustawienia → Skróty klawiszowe"
  re_all_set: "Wszystko gotowe!"
  re_all_set_058a8130: "Wszystko gotowe!"
  ve_exceeded_your_api_rate_limit_or_quota_to: |-
    Przekroczono limit zapytań lub przydział API.
    
    Aby to naprawić:
    1. Poczekaj kilka minut i spróbuj ponownie
    2. Sprawdź limity użycia u dostawcy API
    3. Rozważ zmianę planu API
    
    Transkrypcja została zapisana bez ulepszeń.
your:
  api_key_appears_to_be_invalid_or_expired_to: |-
    Twój klucz API wygląda na nieprawidłowy lub wygasły.
    
    Aby to naprawić:
    1. Otwórz Ustawienia → Ulepszanie AI
    2. Sprawdź, czy klucz API jest poprawny
